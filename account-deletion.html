<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account Deletion Policy - Together</title>
    <link rel="icon" href="icon.png" type="image/png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="container">
        <nav class="nav">
          <div class="nav-left">
            <a href="index.html" class="nav-link">
              <img src="icon.png" alt="Together App Icon" class="logo" />
              <h1>Together</h1>
            </a>
          </div>
          <div class="nav-right">
            <div class="lang-switch" role="group" aria-label="Language switcher">
              <button id="btn-en" class="lang-btn active" data-locale="EN" aria-pressed="true">
                <img src="assets/flags/en.png" alt="English" onerror="this.style.display='none'" />
                <span>EN</span>
              </button>
              <button id="btn-bs" class="lang-btn" data-locale="BS" aria-pressed="false">
                <img src="assets/flags/bs.png" alt="Bosanski" onerror="this.style.display='none'" />
                <span>BS</span>
              </button>
            </div>
          </div>
        </nav>
      </div>
    </header>

    <main>
      <div class="container">
        <section class="policy" id="content"></section>
      </div>
    </main>

    <footer>
      <div class="container">
        <p id="footer-rights">&copy; 2025 SalamanderApp. All rights reserved.</p>
        <p id="footer-contact">Contact us: <a href="mailto:support@salamanderapp.org">support@salamanderapp.org</a></p>
        <p>
          <a id="link-home" href="index.html">Home</a> |
          <a id="link-privacy" href="privacy-policy.html">Privacy Policy</a> |
          <a id="link-terms" href="terms-of-service.html">Terms of Service</a> |
          <a id="link-child" href="child-safety-policy.html">Child Safety Policy</a>
        </p>
      </div>
    </footer>

    <script>
      (function(){
        const html = document.documentElement;
        const el = (id)=>document.getElementById(id);
        const content = el('content');
        const i18n = {
          EN: { code:'en', rights:'\u00A9 2025 SalamanderApp. All rights reserved.', contactPrefix:'Contact us:', links:{home:'Home', privacy:'Privacy Policy', terms:'Terms of Service', child:'Child Safety Policy'}, body:`
            <h2>Together: Account Deletion and Data Policy</h2>
            <p><em>Last Updated: October 11, 2025</em></p>
            <p>We respect your right to privacy and control over your data. If you no longer wish to use Together, you can permanently delete your account and all associated data.</p>
            <p>We’re sorry to see you go and hope to see you again.</p>
            <h3>How to Delete Your Account?</h3>
            <p>Two ways to request deletion (in‑app is fastest and most secure):</p>
            <h4>Method 1: In‑App Deletion (Recommended)</h4>
            <ol><li>Open the Together app</li><li>Go to Profile</li><li>Open Settings</li><li>Scroll down and select Delete Account</li><li>Follow the instructions and confirm</li></ol>
            <p><strong>Warning:</strong> This action is permanent and irreversible.</p>
            <h4>Method 2: Email Request</h4>
            <p>If you cannot access the app, email our support team:</p>
            <ol><li>Send email to: <a href="mailto:support@salamanderapp.org">support@salamanderapp.org</a></li><li>Subject: <strong>Account Deletion Request</strong></li><li>Include: registration email, full name (as in profile), date of birth</li></ol>
            <p>We process your request as soon as possible after verifying identity.</p>
            <h3>What Is Deleted?</h3>
            <ul><li>Your entire profile (name, age, city, bio…)</li><li>All photos</li><li>All conversations and messages</li><li>Matches and likes</li><li>Wallet balance (remaining points)</li><li>Interaction history (swipes, blocks)</li><li>Search preferences</li></ul>
            <h3>Data Retention</h3>
            <p>For security/legal reasons we keep limited, anonymized data for <strong>90 days</strong> after deletion (cannot identify you):</p>
            <ul><li>Internal anonymized user ID</li><li>Report logs (filed by you/against you) to prevent abuse</li><li>Transaction records (without personal data) for finance</li></ul>
            <p>After 90 days this data is also deleted.</p>
            <h3>Confirmation</h3>
            <p>Deletion is irreversible. If you return, you’ll need a new account. For questions: <a href="mailto:support@salamanderapp.org">support@salamanderapp.org</a>.</p>
          `},
          BS: { code:'bs', rights:'\u00A9 2025 SalamanderApp. Sva prava zadržana.', contactPrefix:'Kontakt:', links:{home:'Početna', privacy:'Pravila privatnosti', terms:'Uslovi korištenja', child:'Politika sigurnosti djece'}, body:`
            <h2>Zajedno: Brisanje naloga i politika podataka</h2>
            <p><em>Posljednje ažuriranje: 11. oktobar 2025</em></p>
            <p>Poštujemo vaše pravo na privatnost i kontrolu nad podacima. Ako više ne želite koristiti Zajedno, možete trajno obrisati svoj nalog i sve povezane podatke.</p>
            <p>Žao nam je što odlazite i nadamo se vašem povratku.</p>
            <h3>Kako obrisati nalog?</h3>
            <p>Dva načina (u aplikaciji je najbrže i najsigurnije):</p>
            <h4>Metod 1: Brisanje u aplikaciji (Preporučeno)</h4>
            <ol><li>Otvorite aplikaciju Zajedno</li><li>Idite na Profil</li><li>Otvorite Postavke</li><li>Skrolajte dole i izaberite Brisanje naloga</li><li>Slijedite upute i potvrdite</li></ol>
            <p><strong>Upozorenje:</strong> Ova radnja je trajna i nepovratna.</p>
            <h4>Metod 2: Zahtjev putem emaila</h4>
            <p>Ako ne možete pristupiti aplikaciji, pošaljite zahtjev podršci:</p>
            <ol><li>Pošaljite email na: <a href=\"mailto:support@salamanderapp.org\">support@salamanderapp.org</a></li><li>Naslov: <strong>Zahtjev za brisanje naloga</strong></li><li>U emailu navedite: registracijsku email adresu, ime i prezime (kao u profilu), datum rođenja</li></ol>
            <p>Zahtjev obrađujemo čim potvrdimo identitet.</p>
            <h3>Šta se briše?</h3>
            <ul><li>Vaš cijeli profil (ime, godine, grad, opis…)</li><li>Sve fotografije</li><li>Svi razgovori i poruke</li><li>Match-evi i lajkovi</li><li>Stanje novčanika (preostali poeni)</li><li>Historija interakcija (swipe, blokovi)</li><li>Pretrage i preferencije</li></ul>
            <h3>Zadržavanje podataka</h3>
            <p>Iz sigurnosnih i pravnih razloga čuvamo ograničene, anonimizirane podatke <strong>90 dana</strong> nakon brisanja (bez mogućnosti identifikacije):</p>
            <ul><li>Interni anonimizirani ID korisnika</li><li>Evidencije prijava (vaših i protiv vas) radi prevencije zloupotreba</li><li>Transakcije (bez ličnih podataka) za finansijsko izvještavanje</li></ul>
            <p>Nakon 90 dana i ovi podaci se brišu.</p>
            <h3>Potvrda</h3>
            <p>Brisanje je nepovratno. Ako se vratite, kreiraćete novi nalog. Pitanja: <a href=\"mailto:support@salamanderapp.org\">support@salamanderapp.org</a>.</p>
          `}
        };
        function render(localeKey){
          const t = i18n[localeKey] || i18n.EN;
          html.lang = t.code;
          content.innerHTML = t.body;
          el('footer-rights').innerHTML = `&copy; 2025 SalamanderApp. ${t.rights.replace(/^.*?\u00A9 2025 SalamanderApp\.\s*/, '')}`;
          el('footer-contact').innerHTML = `${t.contactPrefix} <a href=\"mailto:support@salamanderapp.org\">support@salamanderapp.org</a>`;
          el('link-home').textContent = t.links.home;
          el('link-privacy').textContent = t.links.privacy;
          el('link-terms').textContent = t.links.terms;
          el('link-child').textContent = t.links.child;
          document.getElementById('btn-en').classList.toggle('active', localeKey==='EN');
          document.getElementById('btn-bs').classList.toggle('active', localeKey==='BS');
          document.getElementById('btn-en').setAttribute('aria-pressed', String(localeKey==='EN'));
          document.getElementById('btn-bs').setAttribute('aria-pressed', String(localeKey==='BS'));
        }
        function init(){
          const saved = localStorage.getItem('locale') || 'EN';
          render(saved);
          document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>{const key=btn.getAttribute('data-locale');localStorage.setItem('locale',key);render(key);}));
        }
        document.addEventListener('DOMContentLoaded', init);
      })();
    </script>
  </body>
</html>
