<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Child Safety & Protection Policy - Together</title>
    <link rel="icon" href="icon.png" type="image/png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="container">
        <nav class="nav">
          <div class="nav-left">
            <a href="index.html" class="nav-link">
              <img src="icon.png" alt="Together App Icon" class="logo" />
              <h1>Together</h1>
            </a>
          </div>
          <div class="nav-right">
            <div class="lang-switch" role="group" aria-label="Language switcher">
              <button id="btn-en" class="lang-btn active" data-locale="EN" aria-pressed="true">
                <img src="assets/flags/en.png" alt="English" onerror="this.style.display='none'" />
                <span>EN</span>
              </button>
              <button id="btn-bs" class="lang-btn" data-locale="BS" aria-pressed="false">
                <img src="assets/flags/bs.png" alt="Bosanski" onerror="this.style.display='none'" />
                <span>BS</span>
              </button>
            </div>
          </div>
        </nav>
      </div>
    </header>

    <main>
      <div class="container">
        <section class="policy" id="content"></section>
      </div>
    </main>

    <footer>
      <div class="container">
        <p id="footer-rights">&copy; 2025 SalamanderApp. All rights reserved.</p>
        <p id="footer-contact">Contact us: <a href="mailto:support@salamanderapp.org">support@salamanderapp.org</a></p>
        <p>
          <a id="link-home" href="index.html">Home</a> |
          <a id="link-privacy" href="privacy-policy.html">Privacy Policy</a> |
          <a id="link-terms" href="terms-of-service.html">Terms of Service</a> |
          <a id="link-delete" href="account-deletion.html">Account Deletion</a>
        </p>
      </div>
    </footer>

    <script>
      (function(){
        const html = document.documentElement;
        const el = (id)=>document.getElementById(id);
        const content = el('content');
        const i18n = {
          EN: { code:'en', rights:'\u00A9 2025 SalamanderApp. All rights reserved.', contactPrefix:'Contact us:', links:{home:'Home', privacy:'Privacy Policy', terms:'Terms of Service', delete:'Account Deletion'}, body:`
            <h2>Together: Child Safety & Protection Policy</h2>
            <p><em>Last Updated: October 11, 2025</em></p>
            <h3>1. Our Unwavering Commitment to Child Safety</h3>
            <p>At Together (Balkan Muslim Dating), our mission is to provide a safe, Halal-compliant, and culturally sensitive platform. The safety and well-being of our community is paramount.</p>
            <p>We have a <strong>zero-tolerance policy</strong> towards any form of Child Sexual Abuse and Exploitation (CSAE) and Child Sexual Abuse Material (CSAM). We strictly prohibit any activity that involves, promotes, or facilitates the abuse or exploitation of children.</p>
            <h3>2. Definitions</h3>
            <p><strong>CSAE:</strong> Any act involving sexual abuse or exploitation of a minor, including grooming, coercion, or sexual communication with a minor.</p>
            <p><strong>CSAM:</strong> Any visual depiction that shows a minor engaged in sexually explicit conduct.</p>
            <h3>3. Prohibited Conduct</h3>
            <p>Strictly forbidden activities (lead to immediate permanent ban):</p>
            <ul><li>Creating, uploading, sharing, or soliciting CSAM</li><li>Grooming or attempting sexual exploitation of a minor</li><li>Impersonating a minor or contacting perceived minors for sexual purposes</li><li>Sharing links to CSAE/CSAM</li><li>Any behavior violating child safety laws or risking a minor</li></ul>
            <h3>4. Safety Measures: Prevention and Detection</h3>
            <ul><li><strong>Proactive Moderation:</strong> Automated tools (e.g., image screening) and human review for policy-violating content</li><li><strong>In‑App Reporting:</strong> Clear tools to report suspicious content/behavior</li><li><strong>Account Verification:</strong> Measures to improve authenticity and trust</li><li><strong>Account Audits:</strong> Regular reviews of flagged accounts</li></ul>
            <h3>5. Reporting and Enforcement</h3>
            <p><strong>How to report:</strong> Use the in‑app report on profile or chat. Report immediately.</p>
            <p><strong>Review process:</strong> Our safety team prioritizes child safety reports and performs thorough reviews.</p>
            <p><strong>Consequences:</strong> Immediate and permanent ban for violations. No second chances.</p>
            <h3>6. Cooperation with Law Enforcement</h3>
            <ul><li>Report credible CSAM to relevant national authorities</li><li>Where applicable, report to organizations like NCMEC</li><li>Preserve and provide evidence upon valid legal process</li></ul>
            <h3>7. Resources for Help</h3>
            <ul><li>INHOPE: <a href="https://www.inhope.org" target="_blank" rel="noopener noreferrer">www.inhope.org</a></li><li>Hrabri Telefon (Croatia): <a href="https://www.hrabritelefon.hr" target="_blank" rel="noopener noreferrer">www.hrabritelefon.hr</a></li><li>Plavi Telefon (BiH): <a href="https://www.plavitelefon.ba" target="_blank" rel="noopener noreferrer">www.plavitelefon.ba</a></li><li>Your local police</li></ul>
            <h3>8. Contact Us</h3>
            <p>Email: <a href="mailto:support@salamanderapp.org">support@salamanderapp.org</a></p>
          `},
          BS: { code:'bs', rights:'\u00A9 2025 SalamanderApp. Sva prava zadržana.', contactPrefix:'Kontakt:', links:{home:'Početna', privacy:'Pravila privatnosti', terms:'Uslovi korištenja', delete:'Brisanje naloga'}, body:`
            <h2>Zajedno: Politika zaštite djece</h2>
            <p><em>Posljednje ažuriranje: 11. oktobar 2025</em></p>
            <h3>1. Naša nepokolebljiva posvećenost sigurnosti djece</h3>
            <p>U Zajedno (Balkanski Muslim Dating) cilj nam je sigurna, halal‑usklađena i kulturno osjetljiva platforma. Sigurnost zajednice nam je prioritet.</p>
            <p>Imamo <strong>politiku nulte tolerancije</strong> prema bilo kojem obliku seksualnog zlostavljanja i eksploatacije djece (CSAE) i materijala seksualnog zlostavljanja djece (CSAM). Strogo zabranjujemo aktivnosti koje uključuju, promovišu ili olakšavaju zlostavljanje djece.</p>
            <h3>2. Definicije</h3>
            <p><strong>CSAE:</strong> Svaka radnja koja uključuje seksualno zlostavljanje ili eksploataciju maloljetnika, uključujući grooming, prisilu ili seksualnu komunikaciju.</p>
            <p><strong>CSAM:</strong> Svaki vizuelni prikaz maloljetnika u seksualno eksplicitnom kontekstu.</p>
            <h3>3. Zabranjeno ponašanje</h3>
            <p>Strogo zabranjeno (dovodi do trajne zabrane):</p>
            <ul><li>Kreiranje, učitavanje, dijeljenje ili traženje CSAM-a</li><li>Grooming ili pokušaj seksualne eksploatacije maloljetnika</li><li>Lažno predstavljanje kao maloljetnik ili kontaktiranje navodnih maloljetnika u seksualne svrhe</li><li>Dijeljenje linkova ka CSAE/CSAM</li><li>Bilo kakvo ponašanje protivno zakonima zaštite djece</li></ul>
            <h3>4. Sigurnosne mjere: prevencija i detekcija</h3>
            <ul><li><strong>Proaktivna moderacija:</strong> Automatizovani alati (npr. provjera slika) i ručna kontrola</li><li><strong>Prijave u aplikaciji:</strong> Jasni alati za prijavu sumnjivog sadržaja/ponašanja</li><li><strong>Verifikacija naloga:</strong> Mjere autentičnosti i povjerenja</li><li><strong>Revizije naloga:</strong> Redovne provjere prijavljenih naloga</li></ul>
            <h3>5. Prijava i provedba</h3>
            <p><strong>Kako prijaviti:</strong> U profilu ili chatu koristite opciju Prijavi. Prijavite odmah.</p>
            <p><strong>Pregled:</strong> Tim za sigurnost prioritetno obrađuje prijave koje se tiču djece.</p>
            <p><strong>Posljedice:</strong> Trenutna i trajna zabrana naloga. Nema drugog pokušaja.</p>
            <h3>6. Saradnja s vlastima</h3>
            <ul><li>Prijavljujemo vjerodostojne slučajeve CSAM nadležnim organima</li><li>Po potrebi prijavljujemo NCMEC-u ili sličnim organizacijama</li><li>Čuvamo i dostavljamo dokaze na osnovu valjanog pravnog zahtjeva</li></ul>
            <h3>7. Resursi za pomoć</h3>
            <ul><li>INHOPE: <a href="https://www.inhope.org" target="_blank" rel="noopener noreferrer">www.inhope.org</a></li><li>Hrabri Telefon (Hrvatska): <a href="https://www.hrabritelefon.hr" target="_blank" rel="noopener noreferrer">www.hrabritelefon.hr</a></li><li>Plavi Telefon (BiH): <a href="https://www.plavitelefon.ba" target="_blank" rel="noopener noreferrer">www.plavitelefon.ba</a></li><li>Vaša lokalna policija</li></ul>
            <h3>8. Kontakt</h3>
            <p>Email: <a href="mailto:support@salamanderapp.org">support@salamanderapp.org</a></p>
          `}
        };
        function render(localeKey){
          const t = i18n[localeKey] || i18n.EN;
          html.lang = t.code;
          content.innerHTML = t.body;
          el('footer-rights').innerHTML = `&copy; 2025 SalamanderApp. ${t.rights.replace(/^.*?\u00A9 2025 SalamanderApp\.\s*/, '')}`;
          el('footer-contact').innerHTML = `${t.contactPrefix} <a href=\"mailto:support@salamanderapp.org\">support@salamanderapp.org</a>`;
          el('link-home').textContent = t.links.home;
          el('link-privacy').textContent = t.links.privacy;
          el('link-terms').textContent = t.links.terms;
          el('link-delete').textContent = t.links.delete;
          document.getElementById('btn-en').classList.toggle('active', localeKey==='EN');
          document.getElementById('btn-bs').classList.toggle('active', localeKey==='BS');
          document.getElementById('btn-en').setAttribute('aria-pressed', String(localeKey==='EN'));
          document.getElementById('btn-bs').setAttribute('aria-pressed', String(localeKey==='BS'));
        }
        function init(){
          const saved = localStorage.getItem('locale') || 'EN';
          render(saved);
          document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>{const key=btn.getAttribute('data-locale');localStorage.setItem('locale',key);render(key);}));
        }
        document.addEventListener('DOMContentLoaded', init);
      })();
    </script>
  </body>
</html>
